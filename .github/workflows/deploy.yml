name: Deploy Admin Panel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 178.104.102.76
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /var/www/sapphira-admin.valoredigital.es/*

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.102.76
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/*
          target: /var/www/sapphira-admin.valoredigital.es
          strip_components: 1
          overwrite: true
